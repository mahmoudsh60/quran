<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الموضوعي - قصة سيدنا موسى</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #2980b9; }
        #status { margin-top: 20px; font-weight: bold; color: #27ae60; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>المصحف الموضوعي</h1>
        <p>استمع إلى قصة سيدنا موسى عليه السلام بصوت الشيخ ياسر الدوسري</p>
        
        <button id="playBtn">تشغيل القائمة</button>
        <div id="status">جاهز للتشغيل...</div>
        
        <audio id="audioPlayer" controls></audio>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
