<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الموضوعي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .selectors { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; text-align: right;}
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;}
        button { background-color: #27ae60; color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; font-family: inherit; font-weight: bold;}
        button:hover { background-color: #219150; }
        
        /* تنسيق أدوات التحكم الجديدة */
        .playback-controls { display: none; margin-top: 20px; background: #ecf0f1; padding: 15px; border-radius: 8px; }
        .nav-buttons { display: flex; justify-content: space-between; gap: 10px; align-items: center;}
        .nav-btn { background-color: #3498db; width: auto; padding: 10px 15px; font-size: 16px; }
        .nav-btn:hover { background-color: #2980b9; }
        #ayahSelect { flex-grow: 1; max-width: 50%; }

        #status { margin-top: 15px; font-weight: bold; color: #34495e; font-size: 18px; }
        audio { width: 100%; margin-top: 20px; outline: none; }
        #ayahImage { max-width: 100%; margin-top: 20px; min-height: 100px; border-radius: 5px; padding: 10px; background: #fffdf5; border: 1px solid #eee;}
    </style>
</head>
<body>

    <div class="container">
        <h1>المصحف الموضوعي</h1>
        
        <div class="selectors">
            <label>اختر القارئ:</label>
            <select id="reciterSelect"></select>

            <label>اختر الموضوع:</label>
            <select id="topicSelect"></select>
        </div>

        <button id="playBtn">بدء التلاوة</button>
        
        <div id="status">الرجاء اختيار الموضوع والضغط على بدء التلاوة...</div>
        
        <div class="playback-controls" id="playbackControls">
            <div class="nav-buttons">
                <button class="nav-btn" id="nextBtn">التالي ⏭️</button>
                <select id="ayahSelect"></select>
                <button class="nav-btn" id="prevBtn">⏮️ السابق</button>
            </div>
        </div>
        
        <img id="ayahImage" src="" alt="صورة الآية ستظهر هنا" style="display: none;">
        
        <audio id="audioPlayer" controls></audio>
    </div>

    <script src="script.js?v=5"></script> 
</body>
</html>
